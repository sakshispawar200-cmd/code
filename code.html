<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body 
        {
            display: flex;
            justify-content: start;
            align-items: start;
            gap:50px;
            flex-direction: row-reverse;
        }
        .sbox {
            width: 100px;
            height: 100px;
            border:1px solid;
        }
        #red {
            background-color: red;
        }
        #blue {
            background-color: blue;
        }
        #green {
            background-color: green;
        }
    </style>
</head>
<body>
    <div class="sbox"id="red"></div>
    <div class="sbox"id="blue"></div>
    <div class="sbox"id="green"></div>
</body>
</html>
